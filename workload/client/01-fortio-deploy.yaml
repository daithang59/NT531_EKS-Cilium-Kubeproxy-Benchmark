apiVersion: apps/v1
kind: Deployment
metadata:
  name: fortio
  namespace: benchmark
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fortio
  template:
    metadata:
      labels:
        app: fortio
        app.benchmark/pair: workload
    spec:
      # Pin to benchmark nodes (plan §4.5: nodeSelector/affinity)
      nodeSelector:
        role: benchmark
      # Same-node podAntiAffinity: echo and fortio repel each other via the
      # shared label 'app.benchmark/pair: workload' so both land on the same
      # node for single-hop latency measurement.
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - topologyKey: kubernetes.io/hostname
              labelSelector:
                matchExpressions:
                  - key: app.benchmark/pair
                    operator: In
                    values:
                      - workload
      containers:
        - name: fortio
          image: fortio/fortio:1.74.0  # pin version for reproducibility (plan §4.5)
          args: ["server"]  # keep pod alive; we will exec fortio load inside
          ports:
            - containerPort: 8080
          # Resource limits to avoid CPU throttling (plan §2.3)
          resources:
            requests:
              cpu: "500m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
