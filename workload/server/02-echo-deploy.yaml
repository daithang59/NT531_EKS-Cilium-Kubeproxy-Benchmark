apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo
  namespace: benchmark
spec:
  replicas: 1
  selector:
    matchLabels:
      app: echo
  template:
    metadata:
      labels:
        app: echo
        app.benchmark/pair: workload
    spec:
      # Pin to benchmark nodes (plan §4.5: nodeSelector/affinity)
      nodeSelector:
        role: benchmark
      # Cross-node podAntiAffinity: echo and fortio repel each other via the
      # shared label 'app.benchmark/pair: workload', forcing them onto different
      # nodes so traffic always traverses the CNI datapath (no host-local shortcut).
      # NOTE: traffic is east-west cross-node via ClusterIP Service — this is the
      # intended measurement path (not same-node shortcut).
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - topologyKey: kubernetes.io/hostname
              labelSelector:
                matchExpressions:
                  - key: app.benchmark/pair
                    operator: In
                    values:
                      - workload
      containers:
        - name: echo
          image: hashicorp/http-echo:1.0
          args:
            - "-text=ok"
          ports:
            - containerPort: 5678
          # Resource limits to avoid CPU throttling (plan §2.3)
          resources:
            requests:
              cpu: "250m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
