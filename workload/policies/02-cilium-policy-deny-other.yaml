apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: deny-all-to-echo
  namespace: benchmark
spec:
  # Egress-only policy: allows DNS (UDP + TCP) from echo server so CoreDNS
  # lookups succeed.  This is NOT part of the S3 measured phase — it ensures
  # the echo server can resolve DNS even when the default ingress deny is active.
  #
  # NOTE: ingressDeny has been removed from this file. The ingressDeny rule
  # takes precedence over the allow rule in 01-cilium-policy-allow-fortio-to-echo.yaml,
  # which would silently block valid traffic during the S3 measured phase.
  # The deny-case verification (showing DROPPED verdicts) should be run as a
  # separate post-benchmark step, NOT during the measured S3 phase.
  endpointSelector:
    matchLabels:
      app: echo
  egress:
    - toEndpoints:
        - matchLabels: {}
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
    - toEndpoints:
        - matchLabels: {}
      toPorts:
        - ports:
            - port: "53"
              protocol: TCP
