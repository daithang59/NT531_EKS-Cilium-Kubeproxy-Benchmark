# ============================================================
# Mode B — eBPF kube-proxy replacement (kube-proxy-free)
# Cilium version: 1.18.x  (pin chart --version 1.18.7)
# EKS Kubernetes: 1.34 (hoặc 1.33)
# ============================================================
#
# ⚠️ TRƯỚC KHI CÀI MODE B:
# 1. Tắt kube-proxy DaemonSet:
#      kubectl delete daemonset kube-proxy -n kube-system
# 2. Đợi ~30s cho tất cả pods terminated
# Chạy song song kube-proxy + eBPF → NAT table conflict → benchmark sai.
#
# kubeProxyReplacement: true  (= strict mode)
#   eBPF thay thế hoàn toàn kube-proxy. BẮT BUỘC tắt kube-proxy trước.
#
# k8sServiceHost: Lấy từ Terraform output hoặc:
#   aws eks describe-cluster --name nt531-netperf --region ap-southeast-1 \
#     --query cluster.endpoint --output text
#   → Chỉ lấy phần hostname, KHÔNG có https:// và KHÔNG có path.
#
# ⚠️  SAU terraform destroy/apply: EKS endpoint THAY ĐỔI.
#    BẮT BUỘC cập nhật giá trị này trước khi chạy Phase 8 (Mode B upgrade).
#    Sai endpoint → Cilium upgrade nhắm sai cluster → benchmark thất bại SILENT.
#    Cách lấy endpoint mới:
#      aws eks describe-cluster --name nt531-bm --region ap-southeast-1 \
#        --query cluster.endpoint --output text
#    Hoặc từ terraform output sau khi apply.
kubeProxyReplacement: true

# ← CẬP NHẬT EKS API endpoint mỗi lần chạy Mode B sau terraform apply
k8sServiceHost: "8E57874E8F7C2154EC6DA09DEAD405F4.gr7.ap-southeast-1.eks.amazonaws.com"
k8sServicePort: 443

eks:
  enabled: true

# BẮT BUỘC: eni.enabled=true báo cho Helm chart chọn operator-aws image
# (thay vì operator-generic mặc định). operator-aws hỗ trợ ENI IPAM allocator.
# Nếu thiếu dòng này → cilium-operator crash:
#   "cilium-operator-generic: executable file not found in $PATH"
eni:
  enabled: true

# ENI mode cần native routing (không tunnel).
# routingMode: native + ipam.mode: eni = AWS VPC CNI chaining.
# ⚠️ KHÔNG dùng tunnel VXLAN với ENI mode — sẽ crash với lỗi
#    "Cannot specify IPAM mode eni in tunnel mode."
routingMode: "native"
ipv4NativeRoutingCIDR: "10.0.0.0/8"

ipam:
  mode: "eni"

# Hubble cho observability — chỉ có ở Mode B
# ⚠️ CRÍTICAL: Hubble relay/ui pods CẦN nhận ENI IPs (10.0.x.x) sau Mode A→B upgrade.
# Sau khi helm upgrade Mode B, XÓA hubble relay/ui pods để force ENI IP reassignment:
#   kubectl delete pod -n kube-system -l app.kubernetes.io/name=hubble-relay
#   kubectl delete pod -n kube-system -l app.kubernetes.io/name=hubble-ui
# Không làm → relay giữ cluster-pool IP (10.96.x.x) → eBPF datapath drop → BackOff loop.
hubble:
  enabled: true
  relay:
    enabled: true
    # Một relay replica là đủ cho 3-node benchmark cluster
    replicas: 1
    # Anti-affinity: ưu tiên relay pod chạy cùng node với cilium-agent
    # Dùng preferred (weight=100) thay vì required để tránh conflict khi 3 cilium pods
    # chiếm hết 3 nodes → hubble relay/ui không có chỗ schedule.
    # Scheduler sẽ cố gắng đặt relay cùng node cilium, nhưng nếu không được sẽ fallback.
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: k8s-app
                    operator: In
                    values:
                      - cilium
              topologyKey: kubernetes.io/hostname
    tolerations:
      - operator: Exists
  ui:
    enabled: true
    # Hubble UI: same preferred anti-affinity
    # (Không bắt buộc cùng node vì hubble relay là nơi collect flows chính,
    # UI chỉ kết nối tới relay, không cần ENI IP trực tiếp.)
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: k8s-app
                    operator: In
                    values:
                      - cilium
              topologyKey: kubernetes.io/hostname
    tolerations:
      - operator: Exists

prometheus:
  enabled: true
operator:
  prometheus:
    enabled: true
