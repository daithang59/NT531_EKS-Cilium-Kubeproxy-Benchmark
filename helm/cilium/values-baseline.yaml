# ============================================================
# Mode A — Baseline: kube-proxy ON
# Cilium version: 1.18.x  (pin chart --version 1.18.7)
# EKS Kubernetes: 1.34
#
# Mode A: Cilium làm CNI (cluster-pool IPAM), kube-proxy quản lý Service.
# Hubble tắt vì Mode A không cần observability.
# ============================================================

# Cilium 1.14+ dùng boolean
kubeProxyReplacement: false

# EKS-specific
eks:
  enabled: true

# cluster-pool: Cilium quản lý Pod IP allocation riêng.
# cidrPoolIPv4: dải CIDR cho pods — DÙNG DẢI RIÊNG, không overlap VPC.
# KHI THAY ĐỔI, CẬP NHẬT DÒNG NÀY trước khi cài.
ipv4:
  podCIDRList: "10.96.0.0/16"

ipam:
  mode: "cluster-pool"
  operator:
    clusterPoolIPv4PodCIDRList: "10.96.0.0/16"
    clusterPoolIPv4MaskSize: 24

# Tắt Hubble ở Mode A — Mode A không cần observability.
# Mode B sẽ bật Hubble đầy đủ.
hubble:
  enabled: false

prometheus:
  enabled: false

# Override TLS secrets namespace defaults to prevent creating cilium-secrets namespace
# which gets stuck in Terminating and blocks Helm install/upgrade.
tls:
  secretsNamespace:
    name: kube-system
    create: false

operator:
  prometheus:
    enabled: false
